name: Bug report
description: Report a reproducible problem.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for reporting. Please provide enough details to reproduce.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
      placeholder: Clear and short description
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Include exact commands/code if possible.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: go_version
    attributes:
      label: Go version
      placeholder: go version go1.22.x ...
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS and architecture
      placeholder: windows/amd64, linux/amd64, darwin/arm64
    validations:
      required: true
  - type: input
    id: compiler
    attributes:
      label: C compiler
      placeholder: gcc, clang, path to toolchain
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and output
      render: shell
